{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Stats Card -->
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-blue-100 text-blue-500">
                <i class="fas fa-users text-xl"></i>
            </div>
            <div class="ml-4">
                <h2 class="text-gray-600 text-sm">Total Guests</h2>
                <p class="text-2xl font-bold text-gray-800">46</p>
            </div>
        </div>
    </div>
    
    <!-- Upcoming Events Card -->
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-green-100 text-green-500">
                <i class="fas fa-calendar-check text-xl"></i>
            </div>
            <div class="ml-4">
                <h2 class="text-gray-600 text-sm">Upcoming Events</h2>
                <p class="text-2xl font-bold text-gray-800">3</p>
            </div>
        </div>
    </div>
    
    <!-- RSVP Stats Card -->
    <div class="bg-white rounded-lg shadow p-6">
        <div class="flex items-center">
            <div class="p-3 rounded-full bg-purple-100 text-purple-500">
                <i class="fas fa-envelope-open text-xl"></i>
            </div>
            <div class="ml-4">
                <h2 class="text-gray-600 text-sm">RSVP Rate</h2>
                <p class="text-2xl font-bold text-gray-800">78%</p>
            </div>
        </div>
    </div>
</div>

<!-- Recent Events -->
<div class="mt-8 bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b border-gray-200">
        <h3 class="text-lg font-medium text-gray-800">Recent Events</h3>
    </div>
    <div class="p-6">
        <table class="min-w-full divide-y divide-gray-200">
            <thead>
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Event Name</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">RSVPs</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">Summer Gala</td>
                    <td class="px-6 py-4 whitespace-nowrap">06/15/2025</td>
                    <td class="px-6 py-4 whitespace-nowrap">Grand Hotel</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">24 Confirmed</span>
                    </td>
                </tr>
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">Product Launch</td>
                    <td class="px-6 py-4 whitespace-nowrap">07/22/2025</td>
                    <td class="px-6 py-4 whitespace-nowrap">Tech Hub</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-yellow-100 text-yellow-800">16 Pending</span>
                    </td>
                </tr>
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">Team Building</td>
                    <td class="px-6 py-4 whitespace-nowrap">08/05/2025</td>
                    <td class="px-6 py-4 whitespace-nowrap">Pine Park</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">Planning</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
